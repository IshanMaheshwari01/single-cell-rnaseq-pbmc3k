# ---------------------------------------------------------------------------
# Conda environment for the PBMC 3k single-cell RNA-seq project.
#
# Create and activate with:
#     conda env create -f environment.yml
#     conda activate scrnaseq-pbmc3k
#
# This is an alternative to `pip install -r requirements.txt`. Using the
# conda-forge and bioconda channels tends to give the smoothest install of
# the compiled dependencies (igraph, numba, llvmlite) across platforms.
# ---------------------------------------------------------------------------
name: scrnaseq-pbmc3k

channels:
  - conda-forge
  - bioconda

dependencies:
  - python=3.12
  - scanpy>=1.10
  - anndata>=0.10
  - leidenalg>=0.9
  - python-igraph>=0.10
  - umap-learn>=0.5
  - scikit-learn>=1.3
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - matplotlib>=3.7
  - numba>=0.57
  # Notebook tooling
  - jupyterlab>=4.0
  - nbconvert>=7.0
  - nbformat>=5.9
  - ipykernel>=6.0
